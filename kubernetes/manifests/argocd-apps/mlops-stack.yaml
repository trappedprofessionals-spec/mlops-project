apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-stack
  namespace: argocd
spec:
  project: mlops
  source:
    repoURL: https://github.com/YOUR-USERNAME/mlops-manifests.git
    targetRevision: main
    path: overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
